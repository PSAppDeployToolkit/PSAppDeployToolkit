name: Build & Test

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Check text policy (UTF-8 BOM, LF, banned APIs, hard-coded hex, em/en dashes)
        run: pwsh .claude/hooks/post-tool-util.ps1 -CheckAll

      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Fluence.Wpf.sln

      - name: Build solution (Release)
        run: dotnet build Fluence.Wpf.sln -c Release --no-restore -v minimal

      # Screenshots-category tests are PNG regenerators (no pass/fail assertion beyond
      # "rendered without throwing"); they run in full local test runs to refresh
      # docs/screenshots but are skipped here to keep CI fast.
      - name: Test (.NET Framework 4.7.2)
        run: dotnet test Fluence.Wpf.Tests/Fluence.Wpf.Tests.csproj -c Release -f net472 --no-build --verbosity normal --filter "TestCategory!=Screenshots" --logger "trx;LogFileName=net472.trx" --results-directory TestResults/net472

      - name: Test (.NET 10)
        run: dotnet test Fluence.Wpf.Tests/Fluence.Wpf.Tests.csproj -c Release -f net10.0-windows10.0.26100.0 --no-build --verbosity normal --filter "TestCategory!=Screenshots" --logger "trx;LogFileName=net10.trx" --results-directory TestResults/net10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fluence-wpf-test-results
          path: TestResults/
          retention-days: 14

      - name: Upload library artifacts (.NET 10.x)
        uses: actions/upload-artifact@v7
        with:
          name: fluence-wpf-release-dotnet10
          path: |
            Fluence.Wpf/bin/Release/net10.0-windows10.0.26100.0/Fluence.Wpf.dll
            Fluence.Wpf/bin/Release/net10.0-windows10.0.26100.0/Fluence.Wpf.pdb
            Fluence.Wpf/bin/Release/net10.0-windows10.0.26100.0/Fluence.Wpf.xml
            Fluence.Wpf/bin/Release/net10.0-windows10.0.26100.0/Microsoft.Windows.SDK.NET.dll
            Fluence.Wpf/bin/Release/net10.0-windows10.0.26100.0/WinRT.Runtime.dll
          retention-days: 30

      - name: Upload library artifacts (.NET 8)
        uses: actions/upload-artifact@v7
        with:
          name: fluence-wpf-release-dotnet8
          path: |
            Fluence.Wpf/bin/Release/net8.0-windows10.0.26100.0/Fluence.Wpf.dll
            Fluence.Wpf/bin/Release/net8.0-windows10.0.26100.0/Fluence.Wpf.pdb
            Fluence.Wpf/bin/Release/net8.0-windows10.0.26100.0/Fluence.Wpf.xml
            Fluence.Wpf/bin/Release/net8.0-windows10.0.26100.0/Microsoft.Windows.SDK.NET.dll
            Fluence.Wpf/bin/Release/net8.0-windows10.0.26100.0/WinRT.Runtime.dll
          retention-days: 30

      - name: Upload library artifacts (.NET Framework 4.7.2)
        uses: actions/upload-artifact@v7
        with:
          name: fluence-wpf-release-dotnet472
          path: |
            Fluence.Wpf/bin/Release/net472/Fluence.Wpf.dll
            Fluence.Wpf/bin/Release/net472/Fluence.Wpf.pdb
            Fluence.Wpf/bin/Release/net472/Fluence.Wpf.xml
          retention-days: 30

      - name: Upload demo application
        uses: actions/upload-artifact@v7
        with:
          name: fluence-wpf-demo
          path: Fluence.Wpf.Demo/bin/Release/net472/
          retention-days: 30

      - name: Pack NuGet
        run: dotnet pack Fluence.Wpf/Fluence.Wpf.csproj -c Release --no-build -o nupkg/

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: fluence-wpf-nupkg
          path: nupkg/*.nupkg
          retention-days: 30

      # Publishing remains a manual release decision until the NuGet API key
      # and first public version are intentionally configured.
      # - name: Publish to NuGet (tagged releases only)
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

  # Version tags (v*) run the full build/test/pack gates above and then publish a
  # GitHub release with the per-TFM library binaries, the demo, and the NuGet
  # package attached. Tags containing '-pre' are marked as prereleases. Write
  # permission is scoped to this job only; the build job stays read-only.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Compress-Archive -Path artifacts/fluence-wpf-release-dotnet472/* -DestinationPath "dist/Fluence.Wpf-${{ github.ref_name }}-net472.zip"
          Compress-Archive -Path artifacts/fluence-wpf-release-dotnet8/* -DestinationPath "dist/Fluence.Wpf-${{ github.ref_name }}-net8.0-windows.zip"
          Compress-Archive -Path artifacts/fluence-wpf-release-dotnet10/* -DestinationPath "dist/Fluence.Wpf-${{ github.ref_name }}-net10.0-windows.zip"
          Compress-Archive -Path artifacts/fluence-wpf-demo/* -DestinationPath "dist/Fluence.Wpf.Demo-${{ github.ref_name }}-net472.zip"
          Copy-Item artifacts/fluence-wpf-nupkg/*.nupkg dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --repo makes gh operate without a local checkout (this job never checks
          # out the tree; it only downloads the build artifacts).
          $ghArgs = @('release', 'create', '${{ github.ref_name }}', '--repo', '${{ github.repository }}')
          $ghArgs += (Get-ChildItem dist/* | ForEach-Object FullName)
          $ghArgs += @('--title', 'Fluence.Wpf ${{ github.ref_name }}', '--generate-notes')
          if ('${{ github.ref_name }}'.Contains('-pre')) { $ghArgs += '--prerelease' }
          gh @ghArgs
