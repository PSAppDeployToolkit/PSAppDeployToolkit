name: code-coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Disable default CodeQL setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if ! gh api --method PATCH "/repos/${{ github.repository }}/code-scanning/default-setup" \
            --field state=not-configured; then
            echo "::warning::Failed to disable default CodeQL setup. If the workflow fails to upload results, ensure default setup is disabled in the repository's code security settings."
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          config: |
            paths-ignore:
              - lib/Fluence.Wpf/Fluence.Wpf.Tests

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
